<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEELX PIPS | Mobile Journal</title>
    <!-- Premium SVG Favicon matching the modern candles logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%23090d16%22/><path d=%22M30 38v24M30 44h6v12h-6z%22 fill=%22%23ef4444%22 stroke=%22%23ef4444%22 stroke-width=%221.5%22/><path d=%22M50 25v50M50 32h6v36h-6z%22 fill=%22%2310b981%22 stroke=%22%2310b981%22 stroke-width=%221.5%22/><path d=%22M70 45v18M70 49h6v10h-6z%22 fill=%22%2310b981%22 stroke=%22%2310b981%22 stroke-width=%221.5%22/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }

        .premium-card {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95) 0%, rgba(9, 13, 22, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .trade-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .trade-card:active {
            transform: scale(0.98);
            background: rgba(17, 24, 39, 0.95);
        }

        .details-pane {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .details-pane.open {
            max-height: 800px;
        }

        /* Pure Premium Gradients for trades */
        .win-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .loss-gradient { background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%); }
        .be-gradient { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
        .running-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }

        .neon-glow-win { box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
        .neon-glow-loss { box-shadow: 0 0 15px rgba(244, 63, 94, 0.15); }
        .neon-glow-running { box-shadow: 0 0 15px rgba(59, 130, 246, 0.15); }

        @keyframes pulse-radial {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }
        .radial-glow {
            animation: pulse-radial 8s infinite alternate;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen selection:bg-indigo-500 selection:text-white">
    <!-- Ambient Radial Glow Behind Header -->
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[350px] h-[350px] bg-indigo-600/10 rounded-full blur-[80px] pointer-events-none radial-glow z-0"></div>

    <div id="modalContainer"></div>

    <!-- Header / Stats Section -->
    <header class="safe-top bg-gray-950/80 backdrop-blur-xl border-b border-gray-900 sticky top-0 z-50">
        <div class="px-5 py-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-gray-900 to-gray-950 p-2 rounded-xl border border-gray-800 shadow-xl flex-shrink-0">
                        <!-- Neon Candlestick Brand Icon -->
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="10" width="4" height="6" rx="1" fill="#ef4444" />
                            <line x1="5" y1="4" x2="5" y2="20" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
                            
                            <rect x="10" y="5" width="4" height="12" rx="1" fill="#10b981" />
                            <line x1="12" y1="2" x2="12" y2="22" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
                            
                            <rect x="17" y="11" width="4" height="5" rx="1" fill="#10b981" />
                            <line x1="19" y1="6" x2="19" y2="18" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <h1 class="text-base font-extrabold text-white tracking-tight leading-none">
                                NEELX <span class="bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent font-black">PIPS</span>
                            </h1>
                            <!-- $200 to $500 Challenge Subtitle badge -->
                            <span class="text-[9px] font-black px-1.5 py-0.5 rounded-md bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 uppercase tracking-wider whitespace-nowrap">
                                $200 to $500 Challenge
                            </span>
                        </div>
                        <div class="flex items-center gap-2 mt-1">
                            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Mobile Pro Terminal</p>
                            <span class="text-[9px] text-gray-600 font-bold">•</span>
                            <!-- Dynamic Challenge Status Badge -->
                            <span id="challengeStatusBadge" class="text-[8px] font-black px-1 py-0.2 rounded uppercase tracking-wider transition-all duration-300">
                                Fetching...
                            </span>
                        </div>
                    </div>
                </div>
                <div id="syncStatus" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-[9px] font-black uppercase tracking-wider border border-emerald-500/20 flex-shrink-0">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    LIVE SYNC
                </div>
            </div>

            <!-- Dashboard Card -->
            <div class="premium-card rounded-2xl p-5 relative overflow-hidden border border-gray-800">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Current Balance</p>
                        <span id="pnlValue" class="text-xs font-mono font-bold text-emerald-400">+$0.00</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <h2 id="currentBalance" class="text-3xl font-black text-white font-mono">$0.00</h2>
                        <span id="pnlPercent" class="text-xs font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400">+0.00%</span>
                    </div>

                    <!-- Progress Bar to $500 Target -->
                    <div class="mt-4">
                        <div class="flex justify-between text-[9px] font-bold text-gray-500 mb-1 uppercase tracking-wider">
                            <span>Target progress</span>
                            <span id="progressText" class="text-indigo-400 font-mono">0%</span>
                        </div>
                        <div class="w-full bg-gray-950 rounded-full h-1.5 border border-gray-900 overflow-hidden">
                            <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-emerald-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-gray-900">
                        <div class="bg-gray-950/40 p-2 rounded-lg border border-gray-900/50">
                            <p class="text-[8px] font-extrabold text-gray-500 uppercase tracking-wider">Initial Cap</p>
                            <p id="displayCap" class="text-xs font-bold font-mono text-gray-300 mt-0.5">$0.00</p>
                        </div>
                        <div class="bg-gray-950/40 p-2 rounded-lg border border-gray-900/50">
                            <p class="text-[8px] font-extrabold text-gray-500 uppercase tracking-wider">Win Rate</p>
                            <p id="statWinRate" class="text-xs font-bold text-indigo-400 mt-0.5">0%</p>
                        </div>
                        <div class="bg-gray-950/40 p-2 rounded-lg border border-gray-900/50">
                            <p class="text-[8px] font-extrabold text-gray-500 uppercase tracking-wider">Total Trades</p>
                            <p id="statTotal" class="text-xs font-bold font-mono text-gray-300 mt-0.5">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 px-5 py-4 z-10">
        <!-- Dashboard Filters & Controls -->
        <div class="mb-4">
            <div class="flex gap-1 bg-gray-950 p-1 rounded-xl border border-gray-900">
                <button onclick="filterTrades('all')" id="filter-all" class="flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all bg-gray-900 text-white">All</button>
                <button onclick="filterTrades('Win')" id="filter-Win" class="flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all text-gray-500 hover:text-white">Wins</button>
                <button onclick="filterTrades('Loss')" id="filter-Loss" class="flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all text-gray-500 hover:text-white">Losses</button>
                <button onclick="filterTrades('Running')" id="filter-Running" class="flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all text-gray-500 hover:text-white">Active</button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="mb-5 relative">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search asset (e.g. XAUUSD)..." class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 pl-10 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors">
            <div class="absolute left-3.5 top-3.5">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Active Pip Feeds</h3>
            <div class="text-[10px] font-bold text-indigo-400">
                <span id="statDuration">0</span> TRADING DAYS
            </div>
        </div>

        <!-- Trade Cards List Container -->
        <div id="tradeList" class="space-y-3">
            <div class="animate-pulse flex flex-col gap-3">
                <div class="h-20 bg-gray-900/50 border border-gray-900 rounded-2xl w-full"></div>
                <div class="h-20 bg-gray-900/50 border border-gray-900 rounded-2xl w-full"></div>
            </div>
        </div>
    </main>

    <!-- Bottom Footer -->
    <footer class="bg-gray-950/80 backdrop-blur-md border-t border-gray-900 px-6 py-4 pb-8 mt-auto z-10">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <p class="text-[9px] text-gray-500 font-extrabold uppercase tracking-wider">&copy; 2026 Swapneel Das</p>
            </div>
            <button onclick="showModal('disclaimer')" class="text-[9px] font-black text-indigo-400 hover:text-indigo-300 uppercase tracking-widest">Disclaimer</button>
        </div>
    </footer>

    <script>
        let trades = [];
        let initialCapital = 0;
        let currentFilter = 'all';
        let searchQuery = '';

        async function loadData() {
            try {
                // Fetch direct read-only data from the data.json source
                const response = await fetch(`data.json?t=${Date.now()}`);
                if (!response.ok) {
                    throw new Error("Could not load data.json. Ensure file exists and is populated.");
                }
                
                const data = await response.json();
                trades = data.trades || [];
                initialCapital = data.initialCapital || 0;
                
                render();
            } catch (err) {
                console.error(err);
                const syncBadge = document.getElementById('syncStatus');
                if (syncBadge) {
                    syncBadge.innerHTML = 'SYNC ERROR';
                    syncBadge.className = "flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-rose-500/10 text-rose-400 text-[9px] font-black uppercase tracking-wider border border-rose-500/20";
                }
                document.getElementById('tradeList').innerHTML = `
                    <div class="text-center py-12 bg-gray-950/30 border border-rose-950/50 rounded-2xl">
                        <svg class="mx-auto mb-3 text-rose-500/60" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p class="text-xs font-extrabold text-rose-400 uppercase tracking-widest">Failed to load data.json</p>
                        <p class="text-[10px] text-gray-600 mt-1 font-mono">Please verify the file setup.</p>
                    </div>
                `;
            }
        }

        function calculateStats() {
            let net = 0, wins = 0, losses = 0, uniqueDates = new Set();
            trades.forEach(t => {
                const pnl = parseFloat(t.pnl) || 0;
                const fee = parseFloat(t.commission) || 0;
                net += (pnl - fee);
                if (t.result === 'Win') wins++;
                else if (t.result === 'Loss') losses++;
                if (t.date) uniqueDates.add(t.date);
            });

            const current = initialCapital + net;
            const growth = initialCapital > 0 ? ((net / initialCapital) * 100).toFixed(2) : "0.00";
            
            document.getElementById('displayCap').innerText = `$${initialCapital.toLocaleString()}`;
            document.getElementById('currentBalance').innerText = `$${current.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            
            const pnlValueEl = document.getElementById('pnlValue');
            pnlValueEl.innerText = `${net >= 0 ? '+' : ''}$${net.toFixed(2)}`;
            pnlValueEl.className = `text-xs font-mono font-bold ${net >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

            const pnlEl = document.getElementById('pnlPercent');
            pnlEl.innerText = `${net >= 0 ? '+' : ''}${growth}%`;
            pnlEl.className = `text-[10px] font-extrabold px-2 py-0.5 rounded ${net >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`;
            
            document.getElementById('statTotal').innerText = trades.length;
            const wr = (wins + losses) > 0 ? ((wins / (wins + losses)) * 100).toFixed(0) : 0;
            document.getElementById('statWinRate').innerText = `${wr}%`;
            document.getElementById('statDuration').innerText = uniqueDates.size;

            // --- Challenge Logic ($200 to $500) ---
            const startAmount = 200;
            const targetAmount = 500;
            const statusBadge = document.getElementById('challengeStatusBadge');
            
            // Dynamic ongoing vs passed determination
            if (current >= targetAmount) {
                statusBadge.innerText = 'PASSED';
                statusBadge.className = "text-[8px] font-black px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 uppercase tracking-wider animate-pulse";
            } else {
                statusBadge.innerText = 'ONGOING';
                statusBadge.className = "text-[8px] font-black px-2 py-0.5 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 uppercase tracking-wider";
            }

            // Progress bar math
            const progressRange = targetAmount - startAmount;
            const progressGained = current - startAmount;
            let progressPercent = 0;
            if (progressGained > 0) {
                progressPercent = Math.min(100, Math.round((progressGained / progressRange) * 100));
            }
            // Safeguard for negative balance or start values
            if (progressPercent < 0) progressPercent = 0;

            document.getElementById('progressText').innerText = `${progressPercent}%`;
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
        }

        function toggleDetails(id) {
            const pane = document.getElementById(`pane-${id}`);
            const chevron = document.getElementById(`chev-${id}`);
            if (!pane) return;
            const isOpen = pane.classList.toggle('open');
            chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function filterTrades(filterType) {
            currentFilter = filterType;
            const buttons = ['all', 'Win', 'Loss', 'Running'];
            buttons.forEach(b => {
                const btn = document.getElementById(`filter-${b}`);
                if (b === filterType) {
                    btn.className = "flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all bg-gray-900 text-white";
                } else {
                    btn.className = "flex-1 text-center py-2 rounded-lg text-xs font-extrabold uppercase transition-all text-gray-500 hover:text-white";
                }
            });
            render();
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            render();
        }

        function render() {
            const container = document.getElementById('tradeList');
            container.innerHTML = '';

            let filteredTrades = [...trades];

            // Apply Filters
            if (currentFilter !== 'all') {
                if (currentFilter === 'Running') {
                    filteredTrades = filteredTrades.filter(t => !t.exit || t.exit === "" || t.result === 'Running');
                } else {
                    filteredTrades = filteredTrades.filter(t => t.result === currentFilter);
                }
            }

            // Apply Search Query
            if (searchQuery.trim() !== '') {
                filteredTrades = filteredTrades.filter(t => t.asset.toLowerCase().includes(searchQuery));
            }

            // Sort trades chronologically descending
            filteredTrades.sort((a, b) => new Date(b.date) - new Date(a.date) || b.id - a.id);

            if (filteredTrades.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-gray-950/30 border border-gray-900/50 rounded-2xl">
                        <svg class="mx-auto mb-3 text-gray-700" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        <p class="text-xs font-extrabold text-gray-500 uppercase tracking-widest">No matching pip feeds</p>
                    </div>
                `;
                calculateStats();
                return;
            }

            filteredTrades.forEach((trade, index) => {
                const tradeId = trade.id || index;
                const isRunning = !trade.exit || trade.exit === "" || trade.result === 'Running';
                const net = (parseFloat(trade.pnl) || 0) - (parseFloat(trade.commission) || 0);
                
                let gradClass = 'be-gradient';
                let glowClass = '';
                let pnlDisplay = `$${net.toFixed(2)}`;
                let statusLabel = "CLOSED";
                let statusColor = "text-gray-400";

                if (isRunning) {
                    gradClass = 'running-gradient';
                    glowClass = 'neon-glow-running';
                    pnlDisplay = "LIVE";
                    statusLabel = "ACTIVE RUN";
                    statusColor = "text-blue-400";
                } else if (trade.result === 'Win') {
                    gradClass = 'win-gradient';
                    glowClass = 'neon-glow-win';
                    statusColor = "text-emerald-400";
                } else if (trade.result === 'Loss') {
                    gradClass = 'loss-gradient';
                    glowClass = 'neon-glow-loss';
                    statusColor = "text-rose-400";
                }

                const card = document.createElement('div');
                card.className = `trade-card bg-gray-950/50 border border-gray-900 rounded-2xl overflow-hidden mb-3 hover:border-gray-800 ${glowClass}`;
                
                card.innerHTML = `
                    <div class="p-4 flex items-center gap-4 cursor-pointer" onclick="toggleDetails('${tradeId}')">
                        <div class="w-1.5 h-10 rounded-full ${gradClass}"></div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="font-extrabold text-white text-sm uppercase tracking-tight flex items-center gap-1.5">
                                    ${trade.asset}
                                    ${trade.pips ? `<span class="text-[9px] font-mono font-bold bg-gray-900 text-gray-400 border border-gray-800/80 px-1.5 py-0.2 rounded">${trade.pips > 0 ? '+' : ''}${trade.pips} pips</span>` : ''}
                                </h4>
                                <span class="text-xs font-mono font-extrabold ${isRunning ? 'text-blue-400' : (net >= 0 ? 'text-emerald-400' : 'text-rose-400')}">
                                    ${pnlDisplay}
                                </span>
                            </div>
                            <div class="flex justify-between items-center mt-1">
                                <p class="text-[9px] font-bold text-gray-500 uppercase font-mono">${trade.date}</p>
                                <span class="text-[9px] font-black ${statusColor} uppercase tracking-widest flex items-center gap-1">
                                    <span class="w-1 h-1 rounded-full ${isRunning ? 'bg-blue-400 animate-ping' : (net >= 0 ? 'bg-emerald-400' : 'bg-rose-400')}"></span>
                                    ${statusLabel} • ${trade.r_multiple || '0'}R
                                </span>
                            </div>
                        </div>
                        <div id="chev-${tradeId}" class="transition-transform duration-300 text-gray-600">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                    
                    <div id="pane-${tradeId}" class="details-pane bg-gray-950/80 border-t border-gray-900">
                        <div class="p-5 grid grid-cols-2 gap-y-4 gap-x-6">
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Execution Status</label>
                                <p class="text-xs font-extrabold ${statusColor}">${statusLabel}</p>
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Entry Target</label>
                                <p class="text-xs font-mono font-bold text-white">${trade.entry || '---'}</p>
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Absolute Protection (SL)</label>
                                <p class="text-xs font-mono font-bold text-rose-500">${trade.sl || trade.stop_loss || '---'}</p>
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Target Limit / Exit</label>
                                <p class="text-xs font-mono font-bold ${isRunning ? 'text-gray-600' : 'text-emerald-400'}">${trade.exit || trade.tp || 'OPEN FEED'}</p>
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Risk Exposure</label>
                                <p class="text-xs font-mono font-bold text-gray-400">$${parseFloat(trade.size || 0).toFixed(2)}</p>
                            </div>
                            <div>
                                <label class="text-[8px] font-black text-gray-500 uppercase tracking-widest block mb-0.5">Execution Fees</label>
                                <p class="text-xs font-mono font-bold text-gray-500">$${parseFloat(trade.commission || 0).toFixed(2)}</p>
                            </div>
                            <div class="col-span-2 border-t border-gray-900/60 pt-3 flex items-center justify-between">
                                <div>
